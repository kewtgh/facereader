{% if site.comments.disqus.shortname %}
  <script>
    var disqus_config = function () {
      this.page.url = "{{ page.url | absolute_url }}";
      this.page.identifier = "{{ page.id | default: page.url }}";
      this.page.title = {{ page.title | default: site.title | jsonify }};
    };

    (function() {
      var d = document;
      var thread = d.getElementById('disqus_thread');

      if (!thread || thread.dataset.disqusLoaded === 'true') {
        return;
      }

      var s = d.createElement('script');
      s.src = 'https://{{ site.comments.disqus.shortname }}.disqus.com/embed.js';
      s.setAttribute('data-timestamp', String(+new Date()));
      thread.dataset.disqusLoaded = 'true';
      (d.head || d.body).appendChild(s);
    })();
  </script>
<noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
{% endif %}
