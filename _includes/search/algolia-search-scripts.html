{% assign locale = include.locale | default: site.locale %}
<script>
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      var s = document.createElement("script");
      s.src = src;
      s.onload = resolve;
      s.onerror = reject;
      document.body.appendChild(s);
    });
  }

  function escapeHTML(str) {
    return String(str || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function currentUiLanguage() {
    return (document.documentElement.getAttribute("data-fr-ui-lang") || "{{ locale | slice: 0, 2 }}" || "zh").slice(0, 2);
  }

  function algoliaText(key) {
    var lang = currentUiLanguage() === "en" ? "en" : "zh";
    var text = {
      zh: {
        placeholder: "搜索文章…",
        emptyPrefix: "没有找到「",
        emptySuffix: "」相关内容",
        idle: "输入关键词搜索站内文章",
        resultsPrefix: "找到 ",
        resultsMiddle: " 条结果，用时 ",
        resultsSuffix: " ms"
      },
      en: {
        placeholder: "Search articles...",
        emptyPrefix: "No results for \"",
        emptySuffix: "\"",
        idle: "Enter a keyword to search the site",
        resultsPrefix: "",
        resultsMiddle: " results in ",
        resultsSuffix: " ms"
      }
    };
    return text[lang][key] || text.zh[key] || "";
  }

  function refreshAlgoliaUiLanguage() {
    document.querySelectorAll(".algolia-page .ais-SearchBox-input").forEach(function (input) {
      input.setAttribute("placeholder", algoliaText("placeholder"));
    });
  }

  async function initAlgoliaInstantSearchOnce() {
    var roots = Array.prototype.slice.call(document.querySelectorAll(".algolia-page"));
    if (!roots.length) return;

    // InstantSearch 默认主题（也可以自己全部重写）
    if (!document.querySelector("link[data-fr-instantsearch-css]")) {
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "https://cdn.jsdelivr.net/npm/instantsearch.css@8/themes/satellite-min.css";
      css.setAttribute("data-fr-instantsearch-css", "true");
      document.head.appendChild(css);
    }

    // 加载依赖
    if (!window.algoliasearch) {
      await loadScript("https://cdn.jsdelivr.net/npm/algoliasearch@4/dist/algoliasearch-lite.umd.js");
    }
    if (!window.instantsearch) {
      await loadScript("https://cdn.jsdelivr.net/npm/instantsearch.js@4/dist/instantsearch.production.min.js");
    }

    var appId = "{{ site.algolia.application_id }}";
    var apiKey = "{{ site.algolia.search_only_api_key }}";
    var indexName = "{{ site.algolia.index_name }}";

    var searchClient = algoliasearch(appId, apiKey);

    roots.forEach(function (root) {
      if (root.dataset.algoliaInited === "true") return;
      var searchBoxEl = root.querySelector(".algolia-searchbox");
      var statsEl = root.querySelector(".algolia-stats");
      var hitsEl = root.querySelector(".algolia-hits");
      var paginationEl = root.querySelector(".algolia-pagination");
      if (!searchBoxEl || !hitsEl) return;
      root.dataset.algoliaInited = "true";

      var search = instantsearch({
        indexName: indexName,
        searchClient: searchClient
      });

      var widgets = [
        instantsearch.widgets.searchBox({
          container: searchBoxEl,
          placeholder: algoliaText("placeholder"),
          showReset: true,
          showSubmit: true,
          showLoadingIndicator: false
        }),

        instantsearch.widgets.configure({
          hitsPerPage: 10,
          attributesToSnippet: ["description:28", "content:32"],
          snippetEllipsisText: "…"
        }),

        instantsearch.widgets.hits({
          container: hitsEl,
          templates: {
            empty: function (data) {
              return `<div class="algolia-empty">${algoliaText("emptyPrefix")}${escapeHTML(data.query)}${algoliaText("emptySuffix")}</div>`;
            },
            item: function (hit) {
              var img = hit.teaser || "{{ '/assets/img/page-header-image-manufacture-teaser.jpg' | absolute_url }}";
              var titleHTML = (hit._highlightResult && hit._highlightResult.title && hit._highlightResult.title.value)
                ? hit._highlightResult.title.value
                : escapeHTML(hit.title);

              var descHTML = (hit._snippetResult && hit._snippetResult.description && hit._snippetResult.description.value)
                ? hit._snippetResult.description.value
                : ((hit._snippetResult && hit._snippetResult.content && hit._snippetResult.content.value)
                  ? hit._snippetResult.content.value
                  : escapeHTML(hit.description || ""));

              var categories = Array.isArray(hit.categories) ? hit.categories : [];
              var tags = Array.isArray(hit.tags) ? hit.tags : [];
              var meta = [];
              if (hit.date) meta.push(`<time datetime="${escapeHTML(hit.date)}">${escapeHTML(hit.date.slice(0, 10))}</time>`);
              if (categories.length) meta.push(`<span>${escapeHTML(categories.join(" / "))}</span>`);
              var tagHtml = tags.slice(0, 5).map(function (tag) {
                return `<span>${escapeHTML(tag)}</span>`;
              }).join("");

              return `
                <article class="algolia-hit">
                  <a class="algolia-hit__link" href="${escapeHTML(hit.url)}">
                    <div class="algolia-hit__media">
                      <img class="algolia-hit__img" src="${escapeHTML(img)}" alt="">
                    </div>
                    <div class="algolia-hit__body">
                      <h3 class="algolia-hit__title">${titleHTML}</h3>
                      <p class="algolia-hit__desc">${descHTML}</p>
                      <div class="algolia-hit__meta">
                        ${meta.join("<span aria-hidden='true'>·</span>")}
                      </div>
                      ${tagHtml ? `<div class="algolia-hit__tags">${tagHtml}</div>` : ""}
                    </div>
                  </a>
                </article>
              `;
            }
          }
        })
      ];

      if (statsEl) {
        widgets.push(instantsearch.widgets.stats({
          container: statsEl,
          templates: {
            text: function (data) {
              if (!data.query) return algoliaText("idle");
              return `${algoliaText("resultsPrefix")}${data.nbHits}${algoliaText("resultsMiddle")}${data.processingTimeMS}${algoliaText("resultsSuffix")}`;
            }
          }
        }));
      }

      if (paginationEl) {
        widgets.push(instantsearch.widgets.pagination({
          container: paginationEl,
          padding: 2,
          showFirst: false,
          showLast: false
        }));
      }

      search.addWidgets(widgets);

      search.start();

      // 支持 /search/?q=xxx 直接带入查询
      try {
        var params = new URLSearchParams(location.search);
        var q = params.get("q");
        if (q) {
          setTimeout(function () {
            var input = root.querySelector(".algolia-searchbox input[type='search']");
            if (input) {
              input.value = q;
              input.dispatchEvent(new Event("input", { bubbles: true }));
            }
          }, 0);
        }
      } catch (e) {}
    });
  }

  document.addEventListener("DOMContentLoaded", function () {
    initAlgoliaInstantSearchOnce().catch(function (e) {
      console.error("[InstantSearch] init failed:", e);
    });
  });

  document.addEventListener("facereader:ui-language", refreshAlgoliaUiLanguage);
</script>
