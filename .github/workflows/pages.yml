name: Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler: "4.0.16"
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Node deps
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Build site
        env:
          BUNDLE_FROZEN: "true"
          JEKYLL_ENV: production
        run: npm run site:build

      - name: Validate production outputs
        run: |
          set -euo pipefail

          expected_domain="facereader.witbacon.com"
          for required in _site/index.html _site/algolia-records.json _site/CNAME; do
            if [[ ! -f "$required" ]]; then
              echo "::error file=$required::Missing required production output: $required"
              exit 1
            fi
          done

          actual_domain="$(tr -d '\r\n' < _site/CNAME)"
          if [[ "$actual_domain" != "$expected_domain" ]]; then
            echo "::error file=_site/CNAME::Expected _site/CNAME to contain '$expected_domain', got '$actual_domain'"
            exit 1
          fi

      - name: Upload Algolia records
        uses: actions/upload-artifact@v7
        with:
          name: algolia-records
          path: _site/algolia-records.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

  algolia:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Algolia push deps
        run: npm ci --omit=dev

      - name: Download Algolia records
        uses: actions/download-artifact@v8
        with:
          name: algolia-records
          path: _site

      - name: Push records to Algolia
        env:
          ALGOLIA_APP_ID: ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
          ALGOLIA_INDEX_NAME: ${{ secrets.ALGOLIA_INDEX_NAME }}
        run: npm run algolia:push
